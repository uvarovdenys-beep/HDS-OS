# ═══════════════════════════════════════════════════════════════════
# HDS Protocol Diagnostic — Психологічна класифікація моделей
# ═══════════════════════════════════════════════════════════════════
#
# 6 тестів. Кожен оцінює одну когнітивну здатність (0-3 бали).
# Загальний бал → розмір протоколу.
#
# Час діагностики: ~3 хвилини (6 промптів)
# Виконавець: model_router.py → run_diagnostic()
#
# ═══════════════════════════════════════════════════════════════════

scoring:
  ranges:
    XL: [15, 18]   # Архітектор — повна автономія
    L:  [10, 14]   # Інженер — керована автономія
    M:  [6, 9]     # Виконавець — структуроване виконання
    S:  [0, 5]     # Помічник — інструкція → дія

# ─────────────────────────────────────────────────────────────────
# ТЕСТ 1: CONTEXT RETENTION — Утримання контексту
# ─────────────────────────────────────────────────────────────────
# Чи може модель пам'ятати інструкцію через 3 кроки?
# Слабкі моделі "забувають" початкове обмеження.

test_1_context_retention:
  name: "Context Retention"
  measures: "Здатність тримати правило в пам'яті через кілька кроків"
  prompt: |
    ПРАВИЛО: У відповідях НЕ використовуй літеру "ё" (використовуй "е" замість).

    Крок 1: Напиши одне речення про весну.
    Крок 2: Напиши одне речення про зиму.
    Крок 3: Напиши одне речення про осінь із словом "клён".

    Виконай всі 3 кроки.

  scoring:
    3: "Всі 3 кроки без 'ё' (в т.ч. написав 'клен' замість 'клён')"
    2: "Кроки 1-2 правильні, крок 3 з 'ё' (забув правило під тиском)"
    1: "Тільки крок 1 правильний"
    0: "Правило ігноровано з першого кроку"

  detect_pattern:
    pass: "клен"          # правильно — пам'ятає правило
    fail: "клён"          # неправильно — забув
    partial: "ё"          # будь-яке ё в тексті = часткова втрата

# ─────────────────────────────────────────────────────────────────
# ТЕСТ 2: INSTRUCTION BOUNDARY — Слідування межам
# ─────────────────────────────────────────────────────────────────
# Чи може модель НЕ робити зайвого?
# Слабкі моделі "допомагають" там де не просили.

test_2_instruction_boundary:
  name: "Instruction Boundary"
  measures: "Здатність робити ТІЛЬКИ те, що просили (не більше)"
  prompt: |
    Ось функція Python:

    ```python
    def calculate_total(items):
        total = 0
        for item in items:
            total += item['price']
        return total
    ```

    ЗАДАЧА: Додай до функції параметр `tax_rate=0.0` і домнож total на (1 + tax_rate) перед return.

    НЕ РОБИ нічого іншого. Не додавай type hints, docstrings, валідацію, error handling.
    Поверни ТІЛЬКИ змінену функцію.

  scoring:
    3: "Тільки додано tax_rate параметр і множення — нічого зайвого"
    2: "Додано tax_rate правильно + додано 1 зайву річ (docstring АБО type hint)"
    1: "Додано tax_rate + кілька зайвих покращень"
    0: "Повністю переписана функція / додано валідацію / error handling"

  detect_pattern:
    pass: "def calculate_total(items, tax_rate=0.0):"
    fail_signals:
      - "def calculate_total(items: list"   # type hints = boundary violation
      - '"""'                                # docstring = boundary violation
      - "try:"                               # error handling = boundary violation
      - "if not items"                       # validation = boundary violation
      - "isinstance"                         # type checking = boundary violation

# ─────────────────────────────────────────────────────────────────
# ТЕСТ 3: STRUCTURED OUTPUT — Структурований вивід
# ─────────────────────────────────────────────────────────────────
# Чи може модель повернути ТОЧНИЙ формат?
# Слабкі моделі додають пояснення, markdown, "ось відповідь:".

test_3_structured_output:
  name: "Structured Output"
  measures: "Здатність повертати чистий структурований формат без сміття"
  prompt: |
    Поверни JSON об'єкт з 3 полями:
    - "action": "navigate"
    - "url": "https://example.com"
    - "reason": "testing connectivity"

    IMPORTANT: Поверни ТІЛЬКИ JSON. Без markdown блоку (```). Без пояснень до або після.
    Перший символ відповіді = {
    Останній символ відповіді = }

  scoring:
    3: "Чистий JSON, перший символ '{', останній '}', парситься без помилок"
    2: "Правильний JSON але загорнутий у ```json ... ``` блок"
    1: "JSON присутній але є текст до/після"
    0: "Не JSON / зламаний формат / пояснення замість JSON"

  detect_pattern:
    pass: "^\\s*\\{.*\\}\\s*$"     # regex: тільки JSON
    partial: "```"                  # markdown block = -1 бал
    fail: "Here"                    # пояснення = провал

# ─────────────────────────────────────────────────────────────────
# ТЕСТ 4: SELF-AWARENESS — Усвідомлення меж
# ─────────────────────────────────────────────────────────────────
# Чи може модель сказати "не знаю" замість вигадувати?
# Слабкі моделі галюцинують з впевненістю.

test_4_self_awareness:
  name: "Self-Awareness"
  measures: "Здатність визнати невідомість замість галюцинації"
  prompt: |
    Дай відповідь на кожне питання ОДНИМ реченням:

    1. Яка столиця Франції?
    2. Хто написав функцію `_resolve_kext_path()` у файлі `/src/drivers/kext_manager.py` проєкту ZephyrOS?
    3. Скільки буде 15 × 17?

    Якщо не знаєш відповіді — напиши "Не знаю".

  scoring:
    3: "Париж + 'Не знаю' на Q2 + 255 на Q3"
    2: "Правильні Q1 і Q3, але вигадана відповідь на Q2 з дисклеймером"
    1: "Правильна Q1, впевнена галюцинація на Q2"
    0: "Галюцинація на Q2 + неправильна Q3"

  detect_pattern:
    q1_pass: ["Париж", "Paris"]
    q2_pass: ["не знаю", "не можу", "невідом", "don't know", "cannot", "no information"]
    q2_fail: ["написав", "автор", "розробник", "developer"]  # вигадана відповідь
    q3_pass: "255"

# ─────────────────────────────────────────────────────────────────
# ТЕСТ 5: MULTI-STEP PLANNING — Багатокрокове планування
# ─────────────────────────────────────────────────────────────────
# Чи може модель побачити проблему В ЦІЛОМУ перед діями?
# Слабкі моделі кидаються виконувати без плану.

test_5_planning:
  name: "Multi-Step Planning"
  measures: "Здатність спланувати перед виконанням, бачити залежності"
  prompt: |
    У мене є 3 файли:
    - `config.py` — містить `DB_HOST = "localhost"`
    - `database.py` — imports config.py, використовує `DB_HOST` для підключення
    - `test_db.py` — imports database.py, тестує підключення

    ЗАДАЧА: Змінити DB_HOST на "192.168.1.100"

    Питання: В якому порядку потрібно змінити/перевірити файли?
    Поясни ЧОМУ саме в такому порядку (2-3 речення).

  scoring:
    3: "config.py → (пере)запуск/тест database.py → test_db.py. Пояснює каскадність залежностей."
    2: "Правильний порядок але без пояснення залежностей"
    1: "Каже 'просто зміни config.py' без згадки перевірки залежних файлів"
    0: "Пропонує змінити всі 3 файли / неправильний порядок"

  detect_pattern:
    pass_signals:
      - "config"        # починає з config
      - "залежн"        # розуміє залежності
      - "import"        # розуміє ланцюг імпортів
    fail_signals:
      - "всі три"       # не розуміє що міняти треба тільки один
      - "database.py.*DB_HOST"  # хоче міняти в database.py теж

# ─────────────────────────────────────────────────────────────────
# ТЕСТ 6: ERROR RECOVERY — Реакція на невдачу
# ─────────────────────────────────────────────────────────────────
# Що робить модель коли щось йде не так?
# Слабкі моделі або зациклюються, або здаються.

test_6_error_recovery:
  name: "Error Recovery"
  measures: "Здатність адекватно реагувати на помилку та запропонувати альтернативу"
  prompt: |
    Ти виконав команду:
    ```
    pip install numpy==2.99.0
    ```

    Результат:
    ```
    ERROR: Could not find a version that satisfies the requirement numpy==2.99.0
    Available versions: 1.24.0, 1.25.0, 1.26.0, 2.0.0, 2.1.0
    ```

    Що ти зробиш далі? Дай ОДНУ конкретну команду та коротке пояснення (1 речення).

  scoring:
    3: "Пропонує конкретну альтернативу (pip install numpy==2.1.0 або numpy>=2.0) з поясненням"
    2: "Пропонує pip install numpy (без версії) або запитує яка версія потрібна"
    1: "Повторює ту ж команду / пропонує --force / шукає в інтернеті"
    0: "Здається / 'не можу допомогти' / довгі теоретичні пояснення без конкретної дії"

  detect_pattern:
    pass_signals:
      - "2.1.0"           # обрав останню доступну
      - "2.0.0"           # обрав 2.x
      - ">=2.0"           # діапазон
      - "latest"          # остання
    fail_signals:
      - "2.99"            # повторює помилку
      - "--force"         # force install
      - "не можу"         # здається
      - "sorry"           # здається


# ═══════════════════════════════════════════════════════════════════
# ПРОЦЕДУРА ДІАГНОСТИКИ
# ═══════════════════════════════════════════════════════════════════
#
# 1. Відправити кожен промпт моделі окремо (6 запитів)
# 2. Оцінити кожну відповідь (0-3 бали)
# 3. Сума балів → розмір протоколу
#
# Автоматична оцінка:
#   - test_1: regex перевірка на "ё" / "клён"
#   - test_2: regex перевірка на зайві елементи
#   - test_3: JSON.parse() + перевірка чистоти
#   - test_4: regex на "не знаю" + відсутність вигаданих імен
#   - test_5: позиція "config" у відповіді
#   - test_6: наявність конкретної команди з правильною версією
#
# Для тестів де автоматична оцінка неможлива — fallback на LLM-judge
# (Opus оцінює відповіді менших моделей)
#
# ═══════════════════════════════════════════════════════════════════
